name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      versions:
        description: "Space-separated list of versions (e.g. '1.6.1 1.8.0')"
        required: true
        default: "1.5.0 1.6.1 1.7.2 1.8.0 master"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  bench:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 11

      - name: Validate version inputs
        env:
          VERSIONS_INPUT: ${{ github.event.inputs.versions }}
        run: |
          for V in $VERSIONS_INPUT; do
            if [[ ! "$V" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] && [[ "$V" != "master" ]]; then
              echo "::error::Invalid version token '$V' — expected X.Y.Z or 'master'"
              exit 1
            fi
          done

      - name: Clean benchmark data
        run: |
          rm -rf docs/assets/benchmarks/
          mkdir -p docs/assets/benchmarks/

      - name: Run benchmarks
        env:
          VERSIONS_INPUT: ${{ github.event.inputs.versions }}
        run: |
          chmod +x benchmarks/run.sh
          ./benchmarks/run.sh $VERSIONS_INPUT

      # master is protected (required status check "build"), so the results
      # cannot be pushed directly — they go through a PR instead (#144).
      - name: Open PR with benchmark results
        env:
          VERSIONS_INPUT: ${{ github.event.inputs.versions }}
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/assets/benchmarks/
          if git diff --staged --quiet; then
            echo "Benchmark results unchanged; nothing to publish."
            exit 0
          fi
          BRANCH="chore/benchmarks-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git commit -m "bench: results for $VERSIONS_INPUT"
          git push origin "$BRANCH"
          gh pr create \
            --base master \
            --head "$BRANCH" \
            --title "bench: results for $VERSIONS_INPUT" \
            --body "$(printf 'Automated benchmark results from run %s.\n\nBenchmarked versions: %s\n\nMerging this PR updates docs/assets/benchmarks/; the pages deployment is triggered by the merge (pages.yml watches docs/** on master).' "${{ github.run_id }}" "$VERSIONS_INPUT")"
          # Pushes made with GITHUB_TOKEN do not trigger other workflows, so
          # the required "build" check must be dispatched explicitly.
          gh workflow run nightly-build.yml --ref "$BRANCH"
