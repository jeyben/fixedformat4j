name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      versions:
        description: "Space-separated list of versions (e.g. '1.6.1 1.8.0')"
        required: true
        default: "1.5.0 1.6.1 1.7.2 1.8.0 master"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: write

jobs:
  bench:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 11

      - name: Validate version inputs
        env:
          VERSIONS_INPUT: ${{ github.event.inputs.versions }}
        run: |
          for V in $VERSIONS_INPUT; do
            if [[ ! "$V" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] && [[ "$V" != "master" ]]; then
              echo "::error::Invalid version token '$V' — expected X.Y.Z or 'master'"
              exit 1
            fi
          done

      - name: Clean benchmark data
        run: |
          rm -rf docs/assets/benchmarks/
          mkdir -p docs/assets/benchmarks/

      - name: Run benchmarks
        env:
          VERSIONS_INPUT: ${{ github.event.inputs.versions }}
        run: |
          chmod +x benchmarks/run.sh
          ./benchmarks/run.sh $VERSIONS_INPUT

      - name: Commit results
        env:
          VERSIONS_INPUT: ${{ github.event.inputs.versions }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/assets/benchmarks/
          git diff --staged --quiet || git commit -m "bench: results for $VERSIONS_INPUT"
          git push

      - name: Trigger pages deployment
        run: gh workflow run pages.yml --ref master
        env:
          GH_TOKEN: ${{ github.token }}
