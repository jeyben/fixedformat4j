name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      versions:
        description: "Space-separated list of versions (e.g. '1.6.1 1.6.0 master')"
        required: true
        default: "1.6.1 master"
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: write

jobs:
  bench:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 11

      - name: Run benchmarks
        run: |
          chmod +x benchmarks/run.sh
          if [ "${{ github.event_name }}" = "release" ]; then
            ./benchmarks/run.sh "${{ github.event.release.tag_name }}" master
          else
            ./benchmarks/run.sh ${{ github.event.inputs.versions }}
          fi

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/assets/benchmarks/
          git diff --staged --quiet || git commit -m "bench: results for ${{ github.event.inputs.versions || github.event.release.tag_name }}"
          git push

      - name: Trigger pages deployment
        run: gh workflow run pages.yml --ref master
        env:
          GH_TOKEN: ${{ github.token }}
