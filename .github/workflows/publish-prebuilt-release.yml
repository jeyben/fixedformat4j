name: Publish Pre-Built Release to Maven Central

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version to publish (e.g. 1.3.0)'
        required: true
      tag:
        description: 'GitHub release tag (e.g. 1_3_0) — leave blank to auto-derive from version'
        required: false
      java_version:
        description: 'Java version to build with (e.g. 8, 11) — leave blank to auto-detect from pom'
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve tag, version and Java version
        run: |
          VERSION="${{ inputs.version }}"
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG=$(echo "$VERSION" | tr '.' '_')
          fi
          git checkout "$TAG"
          if [ -n "${{ inputs.java_version }}" ]; then
            JAVA_VER="${{ inputs.java_version }}"
          else
            RAW=$(grep -o '<source>[^<]*</source>' fixedformat4j/pom.xml | head -1 | sed 's/<[^>]*>//g')
            JAVA_VER=$(echo "$RAW" | sed 's/^1\.//')
            # Normalise pre-8 versions — Temurin minimum is Java 8
            if [ "$JAVA_VER" -lt 8 ] 2>/dev/null; then JAVA_VER=8; fi
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "RELEASE_TAG=$TAG" >> $GITHUB_ENV
          echo "BUILD_JAVA_VERSION=$JAVA_VER" >> $GITHUB_ENV

      - name: Set up JDK ${{ env.BUILD_JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.BUILD_JAVA_VERSION }}
          distribution: 'temurin'
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_TOKEN
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Build or download artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          if gh release download "$RELEASE_TAG" --pattern "fixedformat4j-*.jar" --dir artifacts 2>/dev/null && \
             [ -f "artifacts/fixedformat4j-$VERSION.jar" ]; then
            echo "Using pre-built artifacts from GitHub release"
          else
            echo "No GitHub release found — building from source at tag $RELEASE_TAG"
            mvn -B package source:jar -pl fixedformat4j -DskipTests --no-transfer-progress
            cp fixedformat4j/target/fixedformat4j-$VERSION.jar artifacts/
            cp fixedformat4j/target/fixedformat4j-$VERSION-sources.jar artifacts/
          fi
          ls -la artifacts/

      - name: Prepare POM and generate javadoc
        run: |
          cp fixedformat4j/pom.xml artifacts/fixedformat4j-$VERSION.pom
          CLASSPATH=$(mvn -B dependency:build-classpath -pl fixedformat4j -Dmdep.outputFile=/dev/stdout -q --no-transfer-progress 2>/dev/null | tail -1)
          find fixedformat4j/src/main/java -name "*.java" > sources.txt
          mkdir -p javadoc-out
          javadoc -encoding ISO-8859-1 -Xdoclint:none -classpath "$CLASSPATH" -d javadoc-out @sources.txt
          jar cf artifacts/fixedformat4j-$VERSION-javadoc.jar -C javadoc-out .

      - name: Generate MD5 and SHA1 checksums
        run: |
          cd artifacts
          for f in *.jar *.pom; do
            md5sum  "$f" | awk '{print $1}' > "$f.md5"
            sha1sum "$f" | awk '{print $1}' > "$f.sha1"
          done

      - name: GPG sign all artifacts
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          cd artifacts
          for f in *.jar *.pom; do
            echo "$MAVEN_GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback \
              --passphrase-fd 0 --armor --detach-sign "$f"
          done

      - name: Build Maven Central bundle
        run: |
          GROUP_PATH="com/ancientprogramming/fixedformat4j/fixedformat4j/$VERSION"
          mkdir -p "bundle/$GROUP_PATH"
          cp artifacts/fixedformat4j-$VERSION.jar              "bundle/$GROUP_PATH/"
          cp artifacts/fixedformat4j-$VERSION.jar.md5          "bundle/$GROUP_PATH/"
          cp artifacts/fixedformat4j-$VERSION.jar.sha1         "bundle/$GROUP_PATH/"
          cp artifacts/fixedformat4j-$VERSION.jar.asc          "bundle/$GROUP_PATH/"
          cp artifacts/fixedformat4j-$VERSION-sources.jar      "bundle/$GROUP_PATH/"
          cp artifacts/fixedformat4j-$VERSION-sources.jar.md5  "bundle/$GROUP_PATH/"
          cp artifacts/fixedformat4j-$VERSION-sources.jar.sha1 "bundle/$GROUP_PATH/"
          cp artifacts/fixedformat4j-$VERSION-sources.jar.asc  "bundle/$GROUP_PATH/"
          cp artifacts/fixedformat4j-$VERSION-javadoc.jar      "bundle/$GROUP_PATH/"
          cp artifacts/fixedformat4j-$VERSION-javadoc.jar.md5  "bundle/$GROUP_PATH/"
          cp artifacts/fixedformat4j-$VERSION-javadoc.jar.sha1 "bundle/$GROUP_PATH/"
          cp artifacts/fixedformat4j-$VERSION-javadoc.jar.asc  "bundle/$GROUP_PATH/"
          cp artifacts/fixedformat4j-$VERSION.pom              "bundle/$GROUP_PATH/"
          cp artifacts/fixedformat4j-$VERSION.pom.md5          "bundle/$GROUP_PATH/"
          cp artifacts/fixedformat4j-$VERSION.pom.sha1         "bundle/$GROUP_PATH/"
          cp artifacts/fixedformat4j-$VERSION.pom.asc          "bundle/$GROUP_PATH/"
          cd bundle && zip -r ../bundle.zip .

      - name: Upload to Maven Central
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_TOKEN: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
        run: |
          BEARER=$(echo -n "$MAVEN_CENTRAL_USERNAME:$MAVEN_CENTRAL_TOKEN" | base64 -w 0)
          curl --fail-with-body -X POST \
            -H "Authorization: Bearer $BEARER" \
            -F "bundle=@bundle.zip" \
            "https://central.sonatype.com/api/v1/publisher/upload?publishingType=USER_MANAGED"
